<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- 1. MANDATORY: Paste your exact Google verification tag here -->

    <!-- 2. Tell Google bots this is temporary so it doesn't hurt your SEO -->

  <title>Be Right Back | Vrushil Patel</title>
  
  <!-- Fonts & Icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    :root {
      --bg: #f1f5f9;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --accent-purple: #6366f1;
      --accent-blue: #3b82f6;
      --border: #e2e8f0;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #090d16;
        --card-bg: #111827;
        --text-main: #f8fafc;
        --text-muted: #9ca3af;
        --border: #1f2937;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      max-width: 440px;
      width: 100%;
      padding: 40px 32px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
    }

    /* Animated Custom Maintenance Illustration */
    .animation-box {
      position: relative;
      width: 90px;
      height: 90px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .base-gear {
      font-size: 3.5rem;
      color: var(--accent-purple);
      animation: spinClockwise 6s linear infinite;
    }

    .sub-gear {
      position: absolute;
      font-size: 1.8rem;
      color: var(--accent-blue);
      top: 10px;
      right: 10px;
      animation: spinCounterClockwise 4s linear infinite;
    }

    @keyframes spinClockwise {
      100% { transform: rotate(360deg); }
    }

    @keyframes spinCounterClockwise {
      100% { transform: rotate(-360deg); }
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
      background: linear-gradient(45deg, var(--accent-purple), var(--accent-blue));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: var(--text-muted);
      font-size: 0.98rem;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .links {
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex: 1;
      padding: 12px 16px;
      border-radius: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-main);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn:hover {
      transform: translateY(-2px);
      background-color: var(--text-main);
      color: var(--card-bg);
      border-color: var(--text-main);
    }

    @media (max-width: 400px) {
      .card { padding: 32px 20px; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <main class="card">
    <!-- Interlocking Animated Gears -->
    <div class="animation-box">
      <i class="bi bi-gear-fill base-gear"></i>
      <i class="bi bi-gear-wide-connected sub-gear"></i>
    </div>

    <h1>Cleaning things up!</h1>
    <p>
      I'm just updating a few code files and refreshing my project list. It shouldn't take long at all—hang tight!
    </p>

    <div class="links">
      <a href="https://github.com/Vrushilpatel2004" target="_blank" rel="noopener noreferrer" class="btn">
        <i class="bi bi-github"></i> GitHub
      </a>
      <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer" class="btn">
        <i class="bi bi-linkedin"></i> LinkedIn
      </a>
    </div>
  </main>

</body>
</html>
